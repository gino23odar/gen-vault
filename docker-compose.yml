version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verdant_vault
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/verdant_vault?schema=public
      JWT_SECRET: dev-secret-change-me
      FRONTEND_URL: http://localhost:5173
      MOCK_MODE: 'true'
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      - db
